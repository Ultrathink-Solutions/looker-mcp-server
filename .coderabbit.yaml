# CodeRabbit configuration
# Docs: https://docs.coderabbit.ai/reference/configuration
#
# Stack: Python 3.11+, uv, ruff, pytest

language: en-US

reviews:
  profile: assertive
  request_changes_workflow: true
  commit_status: true
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  suggested_labels: true
  suggested_reviewers: false
  poem: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 5
    drafts: false
    base_branches:
      - "main"
    ignore_title_keywords:
      - "WIP"
      - "DRAFT"
      - "DO NOT MERGE"
    ignore_usernames:
      - "dependabot"
      - "renovate"
      - "coderabbitai"

  path_filters:
    - "!**/*.lock"
    - "!**/.venv/**"
    - "!**/dist/**"
    - "!**/__pycache__/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/.idea/**"
    - "!**/.vscode/**"
    - "!**/*.egg-info/**"
    - "!**/.pytest_cache/**"
    - "!**/.ruff_cache/**"

  tools:
    ruff:
      enabled: true
    gitleaks:
      enabled: true
    yamllint:
      enabled: true
    shellcheck:
      enabled: true

chat:
  # Disable auto-reply to block prompt-injection via PR comments.
  auto_reply: false

knowledge_base:
  # Scope learnings and issues to this repo only. Prevents a public PR from
  # poisoning a shared knowledge store used across other repositories.
  learnings:
    scope: local
  issues:
    scope: local
  code_guidelines:
    enabled: true
